name: 'Drives Checkout'
description: 'Check out a drive'
author: 'github'
branding:
  icon: 'hard-drive'
  color: 'blue'

inputs:
  drive-name:
    description: 'Name of the drive'
    required: false
    default: default
  path:
    description: 'Directory path under workspace to mount the drive to'
    required: false
  filesystem-type:
    description: 'File system type for empty disk (e.g., ext4, btrfs, xfs)'
    required: false
    default: 'btrfs'
  mkfs-options:
    description: 'Additional options to pass to mkfs command (space-separated)'
    required: false
    default: '-M -d single -m single'
  mount-options:
    description: 'Additional options to pass to mount command (space-separated)'
    required: false
    default: 'compress-force=zstd:3'
  disk-size:
    description: 'Drive size (e.g. "10G", "800G", "1T", or raw bytes). Only applies when creating a new drive — existing drives keep their original size.'
    required: false
    default: '10G'
  prefetch:
    description: |
      When 'true' (default 'false'), eagerly fetch the drive's contents
      in the background after mount completes. Subsequent reads in the
      job hit a local cache instead of paying network latency on first
      read.

      Recommended for read-heavy consumers (test jobs, build jobs that
      read most of the drive). Leave off for drives where the consumer
      reads only a small subset, since bulk prefetch wastes bandwidth.
      This is a no-op when checkout falls back to the empty-disk path
      (for example, when the drive does not exist yet or has no existing
      contents to prefetch).
    required: false
    default: 'false'
  write:
    description: |
      Whether checkout acquires the drive's writer claim (the writer mutex) so a
      later `commit` in this job can publish. One of 'auto', 'true', 'false'.

        - 'auto' (default): infer from `permissions: drives:`. If the workflow
          granted `drives: write`, checkout acquires the claim and holds it for
          the whole job, so the commit publishes against the exact version read
          at checkout with no other run publishing in between. If it granted
          only `drives: read`, checkout stays read-only — you do not need to
          also set `write: true`.
        - 'true': always acquire the claim, and fail fast if
          `permissions: drives: write` is missing. Use for expensive or
          long-running jobs that should reserve the writer slot up front.
        - 'false': never acquire the claim; force a read-only checkout even when
          `drives: write` is granted (e.g. a read-only checkout in a job that
          writes a different drive). Needs only `permissions: drives: read` and
          never blocks a concurrent writer.

      The commit action requires a claim acquired here and fails fast without it.
    required: false
    default: 'auto'
  github-token:
    description: 'GitHub token used for drives permission checks'
    required: false
    default: ${{ github.token }}
outputs:
  drive-available:
    description: 'Whether drive was available and checked out'
  mounted-path:
    description: 'The path where drive was mounted'

runs:
  using: 'node24'
  main: 'dist/index.js'
  # Release the drive's writer claim at job end. A writer checkout holds the
  # writer mutex for the whole job so a later commit can publish; a job that
  # acquires it but never commits (a read-only job that kept the default
  # write: auto with drives: write granted, or a skipped/failed commit) would
  # otherwise hold it until its lease expires (~60s), blocking every concurrent
  # writer of the same drive. This releases it immediately instead. No-op after
  # a commit (which already released it) or a read-only checkout (which never
  # acquired one). always() so a cancelled job frees the claim too.
  post: 'dist/post.js'
  post-if: always()
